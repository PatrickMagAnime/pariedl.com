<!doctype html>
<html lang="de">
  <head>

          <a class="link-row" href="https://manga.pariedl.com" target="_blank" rel="noopener noreferrer">

              <figcaption class="image-placeholder-content">
                <span>meow</span>

      <footer class="footer reveal">

    </main>

    <script src="script.js"></script>
